<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<script defer src="js/firebase.js"></script>
<script defer src="js/app.js"></script>
<script defer src="js/face.js"></script>

</head>
<body>

<div class="header">My DevOps Status</div>

<!-- PROFILE -->
<div class="card">
    <h2 id="username">User</h2>
</div>

<!-- ATTENDANCE -->
<div class="card">
    <h3>Attendance</h3>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>

    <button onclick="startRecognition()">Mark Attendance</button>

    <video id="video" autoplay muted></video>
</div>

<!-- ASSIGNMENTS -->
<div class="card" id="assignments"></div>

<!-- MARKS -->
<div class="card" id="marks"></div>

<!-- FEEDBACK -->
<div class="card">
    <textarea id="feedback"></textarea>
    <button onclick="submitFeedback()">Submit</button>
</div>

</body>
</html>
